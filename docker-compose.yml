# ============================================================
# AI SCADA Platform — Docker Compose Stack
# ============================================================
# Usage:
#   docker-compose up -d          Start all services
#   docker-compose logs -f        Follow all logs
#   docker-compose down           Stop all services
# ============================================================

services:
  # ── MQTT Broker ──────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: scada-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - scada-net

  # ── InfluxDB Time-Series Database ───────────────────────
  influxdb:
    image: influxdb:2
    container_name: scada-influxdb
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_ADMIN_PASSWORD:-adminpassword}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-ELECSOL}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-ELEC1}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped
    networks:
      - scada-net

  # ── SCADA Core API ──────────────────────────────────────
  scada-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: scada-api
    ports:
      - "8000:8000"
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_ORG=${INFLUXDB_ORG:-ELECSOL}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-ELEC1}
      - MQTT_BROKER=mosquitto
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-change-me-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - influxdb
      - mosquitto
    restart: unless-stopped
    networks:
      - scada-net

  # ── MQTT Ingestion Service ──────────────────────────────
  mqtt-ingestor:
    build:
      context: .
      dockerfile: Dockerfile.ingestor
    container_name: scada-ingestor
    environment:
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_ORG=${INFLUXDB_ORG:-ELECSOL}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-ELEC1}
      - MQTT_BROKER=mosquitto
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - influxdb
      - mosquitto
    restart: unless-stopped
    networks:
      - scada-net

  # ── Sensor Simulator ────────────────────────────────────
  sensor-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: scada-simulator
    environment:
      - MQTT_BROKER=mosquitto
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - mosquitto
    restart: unless-stopped
    networks:
      - scada-net

# ── Shared Network ──────────────────────────────────────────
networks:
  scada-net:
    driver: bridge

# ── Persistent Volumes ──────────────────────────────────────
volumes:
  influxdb_data:
  mosquitto_data:
  mosquitto_log:
